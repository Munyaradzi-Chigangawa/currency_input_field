name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Get root dependencies
        run: flutter pub get

      - name: Get example dependencies
        run: flutter pub get
        working-directory: example

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze root package
        run: flutter analyze

      - name: Analyze example
        run: flutter analyze
        working-directory: example

      - name: Run tests
        run: flutter test

      - name: Pub dry run
        run: dart pub publish --dry-run